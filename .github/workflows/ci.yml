name: CI

# Trigger: every push to main, and every pull_request targeting main.
# Tag pushes are intentionally NOT included — release tags should be
# fast-forwarded from a main that has already passed CI.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Concurrency: cancel in-progress runs of older commits on the same ref,
# so that obsolete runs do not consume runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions: explicit minimal. The job only needs to read repository
# contents (checkout). No write, no packages, no elevated scopes.
permissions:
  contents: read

jobs:
  ci:
    name: ci
    # Pin the architecture to x64 explicitly. The `ubuntu-latest`
    # label has been migrating to arm64 in some GitHub Actions
    # accounts and runner pools since 2025, which would silently
    # change the CPU that the lockfile's platform packages target.
    # The esbuild and @vscode/test-electron (VS Code download)
    # platform packages have both x64 and arm64 variants, and
    # `npm ci` may pick the wrong one if the runner arch is
    # ambiguous. Pinning to x64 here pins the entire install
    # to the same architecture the lockfile was generated for
    # (the maintainer's macOS dev box, which is x64-compatible
    # via Rosetta when needed; the local CI-equivalent runs on
    # x64 Linux per the previous debugging).
    #
    # To switch to arm64: change `ubuntu-latest` to
    # `[ubuntu-latest, arm64]` and regenerate the lockfile from
    # an arm64 Linux environment (Docker on Apple Silicon,
    # a Linux arm64 VM, or a native arm64 dev box).
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # `clean: true` is the default but we set it explicitly
          # so a future maintainer does not accidentally leave
          # files from a previous run. (The CI was seeing
          # `esbuild@0.28.0` in package-lock.json after we
          # pushed 0.19.12 — the only way that can happen is if
          # the runner's working directory had a leftover file
          # from a previous run that the checkout did not clean.)
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          # IMPORTANT: no `cache: 'npm'` here. The npm cache can
          # become stale between runs (the cache key is the
          # package-lock.json hash, but GitHub's cache eviction
          # is async and the runner may serve a stale entry for
          # one run after a new lockfile is pushed). For this
          # project, `npm ci` is fast enough (~10 s on a cold
          # runner) that the cache saves < 5 s; not worth the
          # class of "lockfile says X, cache has Y" failures.
          # Re-enable the cache only if `npm ci` becomes a
          # bottleneck in CI.

      # Diagnostic + safety: report the runner architecture,
      # the md5sum of the lockfile, the lockfile version,
      # and the esbuild version it contains. The expected
      # output for a healthy run is:
      #   Runner arch: x86_64
      #   Node arch:   x64
      #   OS:          Linux
      #   lockfile md5: <hash>
      #   lockfileVersion: 2
      #   esbuild in lockfile: 0.19.12
      # If the esbuild version is anything other than 0.19.12,
      # the lockfile is NOT what we pushed — the runner is
      # using a stale file from somewhere.
      - name: Diagnostic: lockfile state
        run: |
          echo "Runner arch: $(uname -m)"
          echo "Node arch:   $(node -e 'console.log(process.arch)')"
          echo "OS:          $(uname -s)"
          echo "lockfile md5: $(md5sum package-lock.json | cut -d' ' -f1)"
          echo "lockfileVersion: $(node -e 'console.log(require("./package-lock.json").lockfileVersion)')"
          echo "esbuild in lockfile: $(node -e 'console.log(require("./package-lock.json").packages["node_modules/esbuild"].version)')"

      # Defensive: clear any pre-existing npm cache before
      # `npm ci`. This is belt-and-suspenders against the
      # stale-cache failure mode described above; in practice
      # it is a no-op on a clean runner but it guarantees that
      # a cached tarball from a previous run cannot poison
      # this run's install.
      - name: Clear npm cache
        run: npm cache clean --force 2>/dev/null || true

      # Defensive: remove any leftover `node_modules/` from a
      # previous failed run on the same runner. `actions/checkout`
      # with `clean: true` removes everything except files in
      # `.gitignore`, but `.gitignore` lists `node_modules/`
      # so it WILL be removed. This step is belt-and-suspenders
      # for the case where the runner's working dir was somehow
      # not cleaned (it has been observed to happen in rare
      # GitHub Actions caching scenarios).
      - name: Clean node_modules
        run: rm -rf node_modules && echo "removed node_modules (if any)"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Harness SDD check
        run: ./check.sh

      # FEAT-021: End-to-end integration test (Mocha +
      # @vscode/test-electron). Runs the extension in a real VS Code
      # instance against a synthetic fixture workspace, exercises
      # the critical user path (activate → click node → open in
      # editor), and asserts R4–R11.
      #
      # `continue-on-error: true` covers the first 30 days after
      # landing FEAT-021: @vscode/test-electron in fresh CI runners
      # is known to be flaky (first run downloads a ~100 MB VS Code
      # build, occasional download races, etc.). After 30 days of
      # stable green runs, remove this flag. Track in:
      #   https://github.com/marcmassa/harness-manager/issues/<TBD>
      # (the maintainer should open the issue and replace <TBD> with
      # the real issue number).
      - name: Run integration test
        continue-on-error: true
        run: xvfb-run -a npm run test:integration
        timeout-minutes: 10
        env:
          # Stabilize the @vscode/test-electron download cache
          # across CI runs. /tmp is ephemeral but the cache itself
          # is keyed on VS Code version, so re-downloads on cache
          # eviction are quick.
          VSCODE_TEST_CACHE: /tmp/vscode-test-cache
