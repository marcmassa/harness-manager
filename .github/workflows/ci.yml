name: CI

# Trigger: every push to main, and every pull_request targeting main.
# Tag pushes are intentionally NOT included — release tags should be
# fast-forwarded from a main that has already passed CI.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Concurrency: cancel in-progress runs of older commits on the same ref,
# so that obsolete runs do not consume runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions: explicit minimal. The job only needs to read repository
# contents (checkout). No write, no packages, no elevated scopes.
permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Harness SDD check
        run: ./check.sh

      # FEAT-021: End-to-end integration test (Mocha +
      # @vscode/test-electron). Runs the extension in a real VS Code
      # instance against a synthetic fixture workspace, exercises
      # the critical user path (activate → click node → open in
      # editor), and asserts R4–R11.
      #
      # `continue-on-error: true` covers the first 30 days after
      # landing FEAT-021: @vscode/test-electron in fresh CI runners
      # is known to be flaky (first run downloads a ~100 MB VS Code
      # build, occasional download races, etc.). After 30 days of
      # stable green runs, remove this flag. Track in:
      #   https://github.com/marcmassa/harness-manager/issues/<TBD>
      # (the maintainer should open the issue and replace <TBD> with
      # the real issue number).
      - name: Run integration test
        continue-on-error: true
        run: xvfb-run -a npm run test:integration
        timeout-minutes: 10
        env:
          # Stabilize the @vscode/test-electron download cache
          # across CI runs. /tmp is ephemeral but the cache itself
          # is keyed on VS Code version, so re-downloads on cache
          # eviction are quick.
          VSCODE_TEST_CACHE: /tmp/vscode-test-cache
